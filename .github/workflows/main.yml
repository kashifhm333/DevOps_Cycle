name: CI/CD Static Site to Azure

on:
  push:
    branches: [ "main" ] # Runs every time you push to main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Log in to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build the image and push it
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/my-static-site:latest

      # Use SSH to tell Azure to pull the new image
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: azureuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Update and install Docker if it's a fresh VM
            sudo apt-get update && sudo apt-get install -y docker.io
            
            # 2. Pull the latest version of your website
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/my-static-site:latest
            
            # 3. Stop the old version (if it's running)
            sudo docker stop web-site || true
            sudo docker rm web-site || true
            
            # 4. Start the new version on Port 80
            sudo docker run -d --name web-site -p 80:80 ${{ secrets.DOCKER_USERNAME }}/my-static-site:latest